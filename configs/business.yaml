# =============================================================================
# Бизнес-конфигурация: ПодрядPRO — кадры, техника, услуги под ключ
# =============================================================================
# Этот файл определяет ВСЮ бизнес-логику AI-агента.
# Целевая аудитория: ЗАКАЗЧИКИ — компании и частные лица, которым нужны
# рабочие, бригады, техника или комплексное обслуживание объектов.
# =============================================================================

business:
  name: "ПодрядPRO"
  niche: "personnel_and_equipment"
  language: "ru"
  website: "https://podryadpro.ru"
  phone: "+7 (XXX) XXX-XX-XX"
  description: >
    ПодрядPRO — платформа для подбора проверенных исполнителей
    и аренды техники в Омске и Новосибирске.
    Грузчики, строители, разнорабочие, уборка, спецтехника и садовая техника.
    Все исполнители с рейтингом и отзывами. Самозанятые и бригады под любую задачу.
    Безопасная сделка: оплата картой, СБП или от организации.
    Деньги в безопасности до завершения работы.

products:
  summary: "Подбор рабочих, бригад и аренда техники — грузчики, стройка, уборка, разнорабочие, спецтехника"
  details:
    - name: "Грузчики"
      description: "Переезды, погрузка/разгрузка, складские работы. От 1 до 10+ человек"
    - name: "Строительные бригады"
      description: "Каменщики, отделочники, электрики, сантехники. Бригады под ключ"
    - name: "Разнорабочие"
      description: "Подсобные работы, демонтаж, вынос мусора, земляные работы"
    - name: "Уборка"
      description: "Уборка после ремонта, генеральная уборка офисов, промышленная уборка"
    - name: "Аренда строительной техники"
      description: "Самосвалы, краны, вышки, экскаваторы, бетономешалки — со скидкой при заказе исполнителей"
    - name: "Аренда садовой техники"
      description: "Газонокосилки, триммеры, мотоблоки, бензопилы"
    - name: "Комплексное обслуживание объекта"
      description: "Рабочие + техника + инструмент под ключ. Одна заявка — вся команда на объекте"
  pricing_policy: >
    Стоимость зависит от объёма работ, количества исполнителей и срока.
    Можно называть ориентировочные расценки: грузчики от 500 руб/час,
    разнорабочие от 400 руб/час, техника — по прайс-листу.
    Точный расчёт — после уточнения деталей заказа.
    Скидка на технику при заказе исполнителей через платформу.

# =============================================================================
# Воронка продаж
# =============================================================================

funnel:
  stages:
    - id: "NEW_REPLY"
      label: "Новый ответ"
      description: "Первый ответ заказчика на холодное письмо"

    - id: "INTERESTED"
      label: "Заинтересован"
      description: "Заказчик проявил интерес, уточняем потребности"

    - id: "KP_SENT"
      label: "КП отправлено"
      description: "Коммерческое предложение с прайсом отправлено"
      attachment: "assets/kp.pdf"

    - id: "IN_DISCUSSION"
      label: "Обсуждение"
      description: "Активное обсуждение деталей заказа"

    - id: "HANDOFF_TO_MANAGER"
      label: "Передача менеджеру"
      description: "Заказчик готов оформить заказ"

    - id: "ORDER"
      label: "Заказ"
      description: "Заказ оформлен"

    - id: "NOT_INTERESTED"
      label: "Не заинтересован"
      description: "Заказчик отказался"

    - id: "ARCHIVED"
      label: "Архив"
      description: "Спам или нерелевантный ответ"

  categories:
    - id: "INTERESTED"
      description: "Заказчик проявляет интерес, хочет узнать больше об услугах"
    - id: "NOT_INTERESTED"
      description: "Заказчик явно отказывается или просит прекратить рассылку"
    - id: "SPAM"
      description: "Автоответ рассылки, нерелевантный контент, отбойник"
    - id: "OUT_OF_OFFICE"
      description: "Автоматический ответ об отсутствии"
    - id: "QUESTION"
      description: "Заказчик задаёт конкретный вопрос о расценках, сроках, доступности"
    - id: "READY_TO_ORDER"
      description: "Заказчик хочет оформить заказ, вызвать бригаду или арендовать технику"

  transitions:
    # NEW_REPLY
    - { from: "NEW_REPLY", on: "INTERESTED", to: "INTERESTED", action: "reply_with_interest" }
    - { from: "NEW_REPLY", on: "QUESTION", to: "INTERESTED", action: "reply_with_interest" }
    - { from: "NEW_REPLY", on: "NOT_INTERESTED", to: "NOT_INTERESTED", action: "reply_not_interested" }
    - { from: "NEW_REPLY", on: "SPAM", to: "ARCHIVED", action: "ignore" }
    - { from: "NEW_REPLY", on: "OUT_OF_OFFICE", to: "NEW_REPLY", action: "ignore" }
    - { from: "NEW_REPLY", on: "READY_TO_ORDER", to: "HANDOFF_TO_MANAGER", action: "handoff_to_manager" }
    # INTERESTED
    - { from: "INTERESTED", on: "INTERESTED", to: "KP_SENT", action: "send_materials" }
    - { from: "INTERESTED", on: "QUESTION", to: "KP_SENT", action: "send_materials" }
    - { from: "INTERESTED", on: "NOT_INTERESTED", to: "NOT_INTERESTED", action: "reply_not_interested" }
    - { from: "INTERESTED", on: "SPAM", to: "ARCHIVED", action: "ignore" }
    - { from: "INTERESTED", on: "OUT_OF_OFFICE", to: "INTERESTED", action: "ignore" }
    - { from: "INTERESTED", on: "READY_TO_ORDER", to: "HANDOFF_TO_MANAGER", action: "handoff_to_manager" }
    # KP_SENT
    - { from: "KP_SENT", on: "INTERESTED", to: "IN_DISCUSSION", action: "continue_discussion" }
    - { from: "KP_SENT", on: "QUESTION", to: "IN_DISCUSSION", action: "continue_discussion" }
    - { from: "KP_SENT", on: "NOT_INTERESTED", to: "NOT_INTERESTED", action: "reply_not_interested" }
    - { from: "KP_SENT", on: "SPAM", to: "ARCHIVED", action: "ignore" }
    - { from: "KP_SENT", on: "OUT_OF_OFFICE", to: "KP_SENT", action: "ignore" }
    - { from: "KP_SENT", on: "READY_TO_ORDER", to: "HANDOFF_TO_MANAGER", action: "handoff_to_manager" }
    # IN_DISCUSSION
    - { from: "IN_DISCUSSION", on: "INTERESTED", to: "IN_DISCUSSION", action: "continue_discussion" }
    - { from: "IN_DISCUSSION", on: "QUESTION", to: "IN_DISCUSSION", action: "continue_discussion" }
    - { from: "IN_DISCUSSION", on: "NOT_INTERESTED", to: "NOT_INTERESTED", action: "reply_not_interested" }
    - { from: "IN_DISCUSSION", on: "SPAM", to: "ARCHIVED", action: "ignore" }
    - { from: "IN_DISCUSSION", on: "OUT_OF_OFFICE", to: "IN_DISCUSSION", action: "ignore" }
    - { from: "IN_DISCUSSION", on: "READY_TO_ORDER", to: "HANDOFF_TO_MANAGER", action: "handoff_to_manager" }

  follow_up_eligible_stages:
    - "KP_SENT"
    - "IN_DISCUSSION"

# =============================================================================
# Follow-up настройки
# =============================================================================

follow_ups:
  delay_days: 3
  max_count: 2

# =============================================================================
# Инструкции AI для каждой стадии воронки
# =============================================================================

stage_instructions:
  NEW_REPLY: >
    Поблагодари за ответ. Представься как помощник платформы ПодрядPRO.
    Уточни, какие исполнители или техника нужны: грузчики, строители,
    разнорабочие, уборка, спецтехника? Спроси про город (Омск/Новосибирск),
    объём работ и желаемые сроки.
  INTERESTED: >
    Предложи отправить коммерческое предложение с прайсом на нужные услуги.
    Расскажи о преимуществах платформы: проверенные исполнители с рейтингом,
    безопасная сделка, скидка на технику при заказе бригады.
    Уточни детали: количество человек, дата начала, адрес объекта.
  KP_SENT: >
    КП уже отправлено. Спроси, успел ли заказчик ознакомиться.
    Ответь на вопросы по расценкам и условиям работы.
    Предложи помочь подобрать оптимальный состав бригады и технику.
  IN_DISCUSSION: >
    Продолжай обсуждение деталей: количество исполнителей, график работ,
    нужная техника, условия оплаты.
    Если это 3+ обмен сообщениями, предложи продолжить в Telegram
    для оперативности: '{telegram_link}'.
    Если заказчик определился — предложи подключить менеджера для оформления.
  HANDOFF_TO_MANAGER: >
    Подтверди, что менеджер свяжется в ближайшее время для оформления заказа.
    Спроси, удобнее ли по телефону, email или в Telegram.

# =============================================================================
# Handoff (передача менеджеру)
# =============================================================================

handoff:
  telegram_keywords:
    - "заказ"
    - "заказать"
    - "оформить"
    - "бригада"
    - "бригаду"
    - "смета"
    - "договор"
    - "замер"
    - "техника"
    - "аренда"
    - "арендовать"
    - "менеджер"
    - "встреча"
    - "встретиться"
    - "позвонить"
    - "звонок"
    - "оплата"
    - "оплатить"
    - "купить"
    - "нанять"

# =============================================================================
# Тон и стиль общения
# =============================================================================

tone:
  formality: "semiformal"
  address: "Вы"
  max_sentences_email: 5
  max_sentences_telegram: 3
  sign_off_style: "professional"

# =============================================================================
# Telegram-бот
# =============================================================================

telegram:
  welcome_message: >
    Здравствуйте, {first_name}! Я — виртуальный помощник платформы
    «{company_name}».

    Могу помочь подобрать исполнителей (грузчики, строители, уборка)
    или технику в аренду. Работаем в Омске и Новосибирске.

    Чем могу быть полезен?
  handoff_confirmation: >
    Отлично! Я передам ваш запрос нашему менеджеру, и он свяжется с вами
    в ближайшее время для оформления заказа. Спасибо за выбор ПодрядPRO!

# =============================================================================
# Google Calendar (бронирование встреч/выездов)
# =============================================================================

calendar:
  enabled: true
  calendar_id: "primary"
  slot_duration_minutes: 30
  working_hours:
    start: "08:00"
    end: "20:00"
  timezone: "Asia/Omsk"

# =============================================================================
# Ответ незаинтересованным
# =============================================================================

not_interested_reply: >
  Спасибо за ваш ответ! Если в будущем понадобятся рабочие или техника,
  мы всегда будем рады помочь. Платформа ПодрядPRO к вашим услугам.
  Хорошего дня!
