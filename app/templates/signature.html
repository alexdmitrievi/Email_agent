<table style="font-family: Arial, sans-serif; font-size: 13px; color: #333; border-collapse: collapse;">
  <tr>
    <td style="padding-right: 15px; border-right: 2px solid #c8a97e; vertical-align: top;">
      <strong>{{ company_name }}</strong>
    </td>
    <td style="padding-left: 15px; vertical-align: top;">
      {% if phone %}&#128222; <a href="tel:{{ phone }}" style="color: #333; text-decoration: none;">{{ phone }}</a><br>{% endif %}
      {% if website %}&#127760; <a href="{{ website }}" style="color: #1a73e8; text-decoration: none;">{{ website }}</a><br>{% endif %}
      {% if messenger_link %}&#128172; <a href="{{ messenger_link }}" style="color: #1a73e8; text-decoration: none;">Написать в Telegram</a>{% endif %}
    </td>
  </tr>
</table>
